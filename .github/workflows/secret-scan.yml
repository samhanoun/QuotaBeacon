name: Secret scan

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '41 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Scan Git history
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install checksum-verified Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --silent --show-error --retry 3 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "$GITLEAKS_SHA256  $archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Detect committed secrets
        run: gitleaks git --redact --no-banner --verbose .
