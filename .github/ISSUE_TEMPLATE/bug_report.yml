name: Bug report
description: Report reproducible QuotaBeacon behavior.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include tokens, prompts, responses, account identifiers, or private source code.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the expected behavior and what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: QuotaBeacon version or commit
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude Code
        - OpenAI Codex
        - Gemini CLI
        - Google Antigravity
        - Plugin
        - Application shell
    validations:
      required: true
