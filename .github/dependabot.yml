version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - xunit*
          - Microsoft.NET.Test.Sdk
          - coverlet.collector

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: '06:15'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
